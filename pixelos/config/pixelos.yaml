server:
  host: "0.0.0.0"
  port: 9999
  debug: false

database:
  mysql:
    host: localhost
    port: 3306
    user: root
    password: ""
    database: pixelos
  mongodb:
    uri: "mongodb://localhost:27017/"
    database: pixelos
  timescaledb:
    host: localhost
    port: 5432
    user: pixelos
    password: pixelos
    database: pixelos

mqtt:
  broker: localhost
  port: 1883
  client_id: pixelos-web
  topic_prefix: pixelos

agent:
  id: "pixelos-main"
  temp_dir: "/tmp/pixelos"
  log_level: INFO
  scan_interval: 3000

update:
  repo: "https://github.com/pixelsoftwaredesign/pixelos-agricol.git"
  branch: main
  backup_dir: "data/backups"

discovery:
  scan_interval: 3000
  wifi_enabled: true
  ble_enabled: true
  radio_enabled: false
  modbus_enabled: false

production:
  data_dir: "data/production"
  auto_create_tasks: true

dns:
  enabled: false
  port: 5300
  domain: "pxl"
  forwarder: "8.8.8.8"
  records:
    pixelos.pxl: "127.0.0.1"
    web.pxl: "127.0.0.1"
    api.pxl: "127.0.0.1"
    mqtt.pxl: "127.0.0.1"
    db.pxl: "127.0.0.1"

paths:
  data: "data"
  temp: "/tmp/pixelos"
  models: "models"
