<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixelOS - {% block title %}AgriCol{% endblock %}</title>
<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --green: #3fb950;
  --red: #f85149;
  --orange: #d29922;
  --blue: #58a6ff;
  --accent: #2ea043;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
}
.nav {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex;
  align-items: center;
  height: 56px;
  gap: 24px;
}
.nav .logo { font-size: 18px; font-weight: 700; color: var(--green); text-decoration: none; }
.nav a {
  color: var(--text-dim);
  text-decoration: none;
  font-size: 14px;
  padding: 4px 0;
  border-bottom: 2px solid transparent;
  transition: 0.15s;
}
.nav a:hover, .nav a.active { color: var(--text); border-bottom-color: var(--green); }
.nav .spacer { flex: 1; }
.nav .nav-section { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin: 0 4px; }
.nav .status-badge { font-size: 12px; color: var(--text-dim); }
.content { padding: 20px; }
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px; margin-bottom: 30px;
}
.stat-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 20px;
}
.stat-card .label { font-size: 12px; color: var(--text-dim); text-transform: uppercase;
  letter-spacing: 0.5px; }
.stat-card .value { font-size: 32px; font-weight: 700; margin-top: 8px; }
.stat-card .value.green { color: var(--green); }
.stat-card .value.red  { color: var(--red); }
.stat-card .value.blue { color: var(--blue); }
.section-title { font-size: 18px; margin: 30px 0 16px; }
table {
  width: 100%; background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; border-collapse: collapse; overflow: hidden;
}
th { text-align: left; padding: 12px 16px; font-size: 12px;
  text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-dim); border-bottom: 1px solid var(--border); }
td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
tr:last-child td { border-bottom: none; }
.badge {
  display: inline-block; padding: 2px 10px; border-radius: 12px;
  font-size: 12px; font-weight: 600;
}
.badge.online { background: rgba(63,185,80,0.15); color: var(--green); }
.badge.offline { background: rgba(248,81,73,0.15); color: var(--red); }
.badge.sensor { background: rgba(88,166,255,0.15); color: var(--blue); }
.badge.valve  { background: rgba(210,153,34,0.15); color: var(--orange); }
.badge.ok { background: rgba(63,185,80,0.15); color: var(--green); }
.badge.ko { background: rgba(248,81,73,0.15); color: var(--red); }
.badge.running { background: rgba(63,185,80,0.15); color: var(--green); }
.badge.stopped { background: rgba(248,81,73,0.15); color: var(--red); }
.refresh { cursor: pointer; color: var(--blue); font-size: 14px; text-decoration: none; }
.refresh:hover { text-decoration: underline; }
.alerts-list { list-style: none; }
.alert-item {
  padding: 12px 16px; border-left: 3px solid var(--orange);
  background: var(--card); margin-bottom: 8px; border-radius: 0 6px 6px 0;
}
.alert-item.critical { border-left-color: var(--red); }
.alert-item .alert-name { font-weight: 600; }
.alert-item .alert-desc { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
input, select {
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 14px;
}
button {
  padding: 8px 16px; border: none; border-radius: 6px;
  cursor: pointer; font-size: 13px; color: #fff;
}
.btn-blue { background: var(--blue); }
.btn-green { background: var(--green); }
.btn-red { background: var(--red); }
.btn-orange { background: var(--orange); }
.toolbar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
iframe.streamlit {
  width: 100%; height: calc(100vh - 76px); border: none;
  background: #fff; border-radius: 8px;
}
</style>
</head>
<body>
<div class="nav">
  <a href="/" class="logo">PixelOS</a>
  <a href="/" class="{% if request.path == '/' %}active{% endif %}">Dashboard</a>
  <a href="/plantes" class="{% if request.path.startswith('/plantes') %}active{% endif %}">Plantes</a>
  <a href="/services" class="{% if request.path.startswith('/services') %}active{% endif %}">Services</a>
  <a href="/streamlit" class="{% if request.path.startswith('/streamlit') %}active{% endif %}">Dashboard</a>
  <span class="nav-section">Programs</span>
  <a href="/programs/text" class="{% if request.path.startswith('/programs/text') %}active{% endif %}">Text</a>
  <a href="/programs/audio" class="{% if request.path.startswith('/programs/audio') %}active{% endif %}">Audio</a>
  <a href="/programs/video" class="{% if request.path.startswith('/programs/video') %}active{% endif %}">Video</a>
  <span class="spacer"></span>
  <span class="status-badge" id="navStatus"></span>
</div>
<div class="content">
{% block content %}{% endblock %}
</div>
<script>
async function updateNavStatus() {
  try {
    const r = await fetch('/api/health');
    const h = await r.json();
    document.getElementById('navStatus').textContent = h.running + '/' + h.total + ' services';
  } catch(e) {}
}
updateNavStatus();
setInterval(updateNavStatus, 15000);
</script>
</body>
</html>
