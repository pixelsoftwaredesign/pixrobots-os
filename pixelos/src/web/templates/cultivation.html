{% extends "base.html" %}
{% block title %}Cultivation - PixelOS{% endblock %}
{% block content %}
<style>
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
.card h3 { font-size: 13px; color: var(--text-dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.card .value { font-size: 28px; font-weight: 700; }
.card .value.green { color: var(--green); }
.card .value.blue { color: var(--blue); }
.card .value.orange { color: var(--orange); }
.tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
.tab { padding: 10px 20px; cursor: pointer; font-size: 14px; color: var(--text-dim); border-bottom: 2px solid transparent; transition: 0.15s; }
.tab.active { color: var(--text); border-bottom-color: var(--green); }
.tab:hover { color: var(--text); }
.panel { display: none; }
.panel.active { display: block; }
input, select { width: 100%; padding: 10px 12px; margin-bottom: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; }
label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.row { display: flex; gap: 12px; }
.row > * { flex: 1; }
.empty { color: var(--text-dim); text-align: center; padding: 40px 0; }
.result-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-top: 12px; font-family: monospace; font-size: 13px; white-space: pre-wrap; max-height: 400px; overflow: auto; }
.item { padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.item:last-child { border-bottom: none; }
.badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.badge.ok { background: rgba(63,185,80,0.15); color: var(--green); }
.badge.warn { background: rgba(210,153,34,0.15); color: var(--orange); }
</style>

<div class="toolbar">
  <h2 style="flex:1;font-size:20px;"><span>&#x1F33E;</span> Monitoring Transverse</h2>
  <button class="btn-green" onclick="runMonitor()">&#x1F4CA; Smart Monitor</button>
  <button class="btn-blue" onclick="refreshAll()">&#x21bb;</button>
</div>

<div class="grid" id="statsGrid"></div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('report',this)">Rapport</div>
  <div class="tab" onclick="switchTab('suggestions',this)">Suggestions</div>
</div>

<div id="panel-report" class="panel active">
  <div class="toolbar" style="margin-bottom:12px;">
    <select id="reportSpace" style="width:auto;" onchange="loadReport()"><option value="">Tous les espaces</option></select>
  </div>
  <div id="reportContent"><div class="empty">Chargement...</div></div>
</div>
<div id="panel-suggestions" class="panel"><div class="empty">Chargement...</div></div>

<script>
async function api(url, opts={}) {
  const r = await fetch(url, { headers:{'Content-Type':'application/json'}, ...opts });
  return r.json();
}
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'report') loadReport();
  if (name === 'suggestions') loadSuggestions();
}

async function refreshAll() {
  const [status] = await Promise.all([api('/api/cultivation/status'), loadReport()]);
  document.getElementById('statsGrid').innerHTML = `
    <div class="card"><h3>Plantations actives</h3><div class="value green">${status.active_plantations || 0}</div></div>
    <div class="card"><h3>Espaces</h3><div class="value blue">${status.total_spaces || 0}</div></div>
    <div class="card"><h3>Alertes</h3><div class="value ${(status.alerts||0) > 0 ? 'orange' : ''}">${status.alerts || 0}</div></div>
    <div class="card"><h3>Suggestions</h3><div class="value">${status.total_suggestions || 0}</div></div>`;
  const spaces = status.spaces || [];
  const sel = document.getElementById('reportSpace');
  sel.innerHTML = '<option value="">Tous les espaces</option>' + spaces.map(s => `<option value="${s}">${s}</option>`).join('');
}

async function runMonitor() {
  const data = await api('/api/cultivation/monitor', { method:'POST' });
  document.getElementById('reportContent').innerHTML = `<div class="result-box">${JSON.stringify(data, null, 2)}</div>`;
}

async function loadReport() {
  const space = document.getElementById('reportSpace').value;
  let url = '/api/cultivation/report';
  if (space) url += '?espace_id=' + space;
  const data = await api(url);
  document.getElementById('reportContent').innerHTML = data.report
    ? `<div class="result-box">${JSON.stringify(data, null, 2)}</div>`
    : '<div class="empty">Aucun rapport disponible</div>';
}

async function loadSuggestions() {
  const data = await api('/api/cultivation/suggestions');
  const list = data.suggestions || [];
  const container = document.getElementById('panel-suggestions');
  if (!list.length) { container.innerHTML = '<div class="empty">Aucune suggestion</div>'; return; }
  container.innerHTML = list.map(s => `<div class="item">
    <div style="display:flex;justify-content:space-between;">
      <span><strong>${s.title || s.type || 'Suggestion'}</strong></span>
      <span class="badge ${s.priority === 'haute' || s.priority === 'critique' ? 'warn' : 'ok'}">${s.priority || 'normale'}</span>
    </div>
    <div style="font-size:12px;color:var(--text-dim);margin-top:4px;">${s.description || ''}</div>
    ${s.space ? `<div style="font-size:11px;color:var(--text-dim);margin-top:2px;">${s.space}</div>` : ''}
  </div>`).join('');
}

refreshAll();
</script>
{% endblock %}
