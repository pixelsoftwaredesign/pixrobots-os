{% extends "base.html" %}
{% block title %}Produits - PixelOS{% endblock %}
{% block content %}
<style>
.pr-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 16px; }
.pr-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
.pr-card .pr-name { font-size: 18px; font-weight: 700; }
.pr-card .pr-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 12px; }
.stage-bar { display: flex; height: 8px; border-radius: 4px; overflow: hidden; margin: 8px 0; }
.stage-bar .seg { flex: 1; opacity: 0.3; }
.stage-bar .seg.active { opacity: 1; }
.stage-bar .seg.germination { background: var(--blue); }
.stage-bar .seg.croissance { background: var(--green); }
.stage-bar .seg.floraison { background: var(--orange); }
.stage-bar .seg.fructification { background: var(--red); }
.stage-bar .seg.recolte { background: var(--accent); }
.stage-bar .seg.dormance { background: var(--text-dim); }
.stage-item { background: var(--bg); border-radius: 6px; padding: 10px; margin: 6px 0; font-size: 13px; }
.stage-item.active { border-left: 3px solid var(--green); }
.stage-item .si-name { font-weight: 600; }
.stage-item .si-days { color: var(--text-dim); font-size: 12px; }
.stage-item .si-tasks { margin-top: 4px; font-size: 12px; color: var(--text-dim); }
.stage-item .si-req { margin-top: 4px; font-size: 11px; color: var(--text-dim); }
.plantations-section { margin-top: 20px; }
.plant-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.plant-row .day { color: var(--blue); font-weight: 700; }
.plant-row .stage-badge { display: inline-block; padding: 1px 8px; border-radius: 8px; font-size: 11px; background: rgba(88,166,255,0.15); color: var(--blue); }
</style>

<div class="toolbar">
  <span class="section-title" style="margin:0">Produits et plantations</span>
  <button class="btn-blue" onclick="generateTasks()">Generer taches</button>
  <button class="btn-green" onclick="getSuggestions()">Suggestions</button>
  <span id="actionStatus" style="font-size:13px;color:var(--text-dim)"></span>
</div>

<div id="suggestions" style="display:none;margin-bottom:16px"></div>

<div class="pr-grid" id="productsGrid"></div>

<div class="section-title" style="margin-top:30px">Plantations actives</div>
<div id="plantationsList"></div>

<script>
async function loadAll() {
  const [products, plantations] = await Promise.all([
    fetch('/api/products').then(r=>r.json()),
    fetch('/api/plantations').then(r=>r.json()),
  ]);
  renderProducts(products);
  renderPlantations(plantations);
}

function renderProducts(products) {
  const grid = document.getElementById('productsGrid');
  grid.innerHTML = products.map(p => {
    const totalDays = p.cycle_days;
    const stages = p.stages || [];
    const barSegs = stages.map(s => {
      const pct = ((s.day_end - s.day_start) / totalDays * 100).toFixed(0);
      return `<div class="seg ${s.name}" style="flex:${pct}"></div>`;
    }).join('');
    const stagesHtml = stages.map(s => `
      <div class="stage-item">
        <div class="si-name">${escHtml(s.name)}</div>
        <div class="si-days">J${s.day_start} - J${s.day_end} (${s.day_end - s.day_start}j)</div>
        <div class="si-req">T: ${s.temp_min}-${s.temp_max}°C / H: ${s.humidity_min}-${s.humidity_max}% / Lumiere: ${s.light_heures||s.light_hours}h</div>
        <div class="si-tasks">${s.tasks ? s.tasks.map(t => '• ' + escHtml(t)).join('<br>') : ''}</div>
      </div>
    `).join('');
    return `<div class="pr-card">
      <div class="pr-name">${escHtml(p.label)}</div>
      <div class="pr-meta">${p.type} · ${p.variete} · Cycle ${p.cycle_days}j · ${p.family}</div>
      <div class="stage-bar">${barSegs}</div>
      ${stagesHtml}
    </div>`;
  }).join('');
}

function renderPlantations(plantations) {
  const div = document.getElementById('plantationsList');
  const active = plantations.filter(p => p.status === 'active');
  if (!active.length) {
    div.innerHTML = '<div style="color:var(--text-dim);font-style:italic">Aucune plantation active</div>';
    return;
  }
  div.innerHTML = active.map(p => {
    return `<div class="plant-row">
      <span><strong>${escHtml(p.label || p.product_id)}</strong> @ ${p.espace_id}/${p.sub_zone_id}</span>
      <span><span class="day">J${p.day_of_cycle}</span></span>
      <span>Plante: ${p.quantity} · Planté: ${p.planted_at}</span>
    </div>`;
  }).join('');
}

async function generateTasks() {
  document.getElementById('actionStatus').textContent = 'Generation...';
  const r = await fetch('/api/lifecycle/generate-tasks', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({force: true})
  });
  const tasks = await r.json();
  document.getElementById('actionStatus').textContent = tasks.length + ' taches generees';
}

async function getSuggestions() {
  document.getElementById('actionStatus').textContent = 'Analyse...';
  const r = await fetch('/api/lifecycle/suggestions');
  const suggs = await r.json();
  const div = document.getElementById('suggestions');
  if (!suggs.length) {
    div.innerHTML = '<div style="color:var(--text-dim)">Aucune suggestion pour le moment</div>';
  } else {
    div.innerHTML = suggs.map(s => 
      `<div style="background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px;margin:4px 0;font-size:13px">
        <strong>[${s.priority}]</strong> ${s.message}
        <div style="font-size:12px;color:var(--text-dim)">${s.product} · ${s.espace}</div>
      </div>`
    ).join('');
  }
  div.style.display = 'block';
  document.getElementById('actionStatus').textContent = suggs.length + ' suggestions';
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

loadAll();
</script>
{% endblock %}
