# PixelOS - DHCP pour réseau IoT (capteurs/ESP32/Arduino)
# Interface: em1 (réseau IoT isolé)
# Sous-réseau: 10.0.100.0/24

option domain-name "iot.pixelos.local";
option domain-name-servers 10.0.100.1;

subnet 10.0.100.0 netmask 255.255.255.0 {
    range 10.0.100.100 10.0.100.200;
    option routers 10.0.100.1;
    option broadcast-address 10.0.100.255;
    default-lease-time 86400;
    max-lease-time 604800;

    # Réservations statiques pour nœuds critiques
    host node_serre_nord {
        hardware ethernet 24:0a:c4:01:00:01;
        fixed-address 10.0.100.10;
    }
    host vanne_serre_nord {
        hardware ethernet 24:0a:c4:01:00:02;
        fixed-address 10.0.100.30;
    }
    host station_meteo {
        hardware ethernet 24:0a:c4:01:00:03;
        fixed-address 10.0.100.20;
    }
}
