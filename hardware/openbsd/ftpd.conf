# AgriCol - Configuration ftpd OpenBSD
# Serveur FTP interne pour transfert fichiers lourds
# (logs capteurs, photos drones, rapports imagerie)
#
# ftpd est lancé par inetd ou en mode standalone.
# Voir: rcctl set ftpd flags "-l -A -P /var/run/ftpd.pid"
#
# NOTE: ftpd chroot automatiquement chaque utilisateur
# dans son répertoire home. Les permissions sont
# gérées par les groupes Unix.

# --- Fichier des utilisateurs autorisés ---
# /etc/ftpusers contient les login autorisés (avec flag -A).
# Ajouter: echo "ftp-zone-nord" >> /etc/ftpusers

# --- Répertoires FTP par zone agricole ---
# Chaque zone a un utilisateur dédié avec chroot dans /var/ftp/<zone>/
#
# Structure:
# /var/ftp/
#   zone-nord/         <- utilisateur: ftp-zone-nord
#     uploads/         <- dépôt rapports capteurs + photos drones
#     logs/            <- logs automatiques
#     partage/         <- documents communs (lecture groupe)
#   zone-serre-a/     <- utilisateur: ftp-zone-serre-a
#     uploads/
#     logs/
#     partage/
#   zone-verger/       <- utilisateur: ftp-zone-verger
#     ...
#   agronomes/         <- utilisateur: ftp-agronomes (accès inter-zones)
#     rapports/
#     analyses/
#     partage/

# --- Groupes ---
# wheel:           Full access (admin)
# ftp-agronomes:   Accès en lecture aux zones de culture
# ftp-techniciens: Accès upload aux zones assignées
# ftp-capteurs:    Dépôt automatique des logs capteurs (restreint)
