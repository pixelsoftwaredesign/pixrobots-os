# PixelOS - relayd(8) TLS termination for HTTPS
# Termine SSL/TLS et forward en HTTP vers httpd (port 80)
# Ou alternativement directement vers Flask (port 9999)
#
# Installation:
#   rcctl enable relayd
#   rcctl set relayd flags -f /etc/relayd.conf
#
# Génération certificat auto-signé:
#   openssl req -x509 -nodes -days 3650 -newkey rsa:4096 \
#     -keyout /etc/ssl/private/pixelos.key \
#     -out /etc/ssl/pixelos.crt \
#     -subj "/C=MA/ST=AgriCol/L=Ferme/O=PixelOS/CN=agricol.local"

ext_addr="em0"

# ── Relay HTTPS → HTTP (via httpd) ──
table <httpd> { 127.0.0.1 }

protocol "https_tls" {
    tls { keypair "pixelos" }

    match request header set "X-Forwarded-For" value "$REMOTE_ADDR"
    match request header set "X-Forwarded-Proto" value "https"
    match response header set "Strict-Transport-Security" value "max-age=31536000"

    tcp { nodelay, sack }
}

relay "https_relay" {
    listen on $ext_addr port 443 tls
    protocol "https_tls"
    forward to <httpd> port 80
}

