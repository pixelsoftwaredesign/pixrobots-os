# AgriCol - sysctl.conf optimisé pour serveur agricole

# Watchdog (30 secondes)
hw.watchdog=30

# Sécurité réseau
net.inet.ip.forwarding=0          # Pas de routage
net.inet6.ip6.forwarding=0
net.inet.tcp.syncookies=1        # Protection SYN flood
net.inet.ip.redirect=0           # Pas de redirection ICMP

# Performances pour IoT
kern.bufcachepercent=50           # Cache disque pour base de données
net.inet.tcp.recvspace=65535      # Buffer réception
net.inet.tcp.sendspace=65535      # Buffer envoi

# Journalisation
net.inet.tcp.log_in_vain=1        # Log connexions refusées
net.inet.udp.log_in_vain=1
