# relayd.conf — PixelOS Appliance
# Reverse proxy TLS pour services PixelOS
# httpd sert le contenu statique, relayd gère le TLS

# ── Tables ──
table <web_backends>  { 127.0.0.1 }
table <matrix_backends> { 127.0.0.1 }

# ── Protocole HTTPS (services PixelOS + Comms) ──
protocol "https_pixelos" {
    tcp { nodelay, sack, socket buffer 65536 }
    tls { keypair "pixelos" }
    tls { no tlsv1.0, no tlsv1.1 }
    # Sécurité
    match request header "X-Forwarded-For" value "$REMOTE_ADDR"
    match request header "X-Forwarded-Proto" value "https"
    # Sécurité HSTS
    match response header "Strict-Transport-Security" value "max-age=31536000"

    # Routage Matrix :443/_matrix/*
    match request path "/_matrix/*" forward to <matrix_backends>
    match request path "/_synapse/*" forward to <matrix_backends>
    # Routage Element Web :443/comms
    match request path "/comms/*" forward to <http_backends>

    # Routage PixelOS
    match request path "/*" forward to <web_backends>
}

# ── Protocole Fédération Matrix ──
protocol "matrix_federation" {
    tcp { nodelay, sack, socket buffer 65536 }
    tls { keypair "pixelos" }
    # La fédération Matrix nécessite que le SNI corresponde au server_name
}

# ── Relay HTTPS (port 443) ──
relay "https_pixelos" {
    listen on egress port 443 tls
    protocol "https_pixelos"
    forward to <web_backends> port 9999  # PixelOS Web UI
    forward to <matrix_backends> port 6167  # Conduit Matrix
}

# ── Relay Fédération Matrix (port 8448) ──
relay "matrix_federation" {
    listen on egress port 8448 tls
    protocol "matrix_federation"
    forward to <matrix_backends> port 6167
}
