# pf.conf — PixelOS Appliance
# Pare-feu Packet Filter pour OpenBSD

# ── Interfaces ──
egress = "vio0"
wg_if = "wg0"
wg_net = "10.100.0.0/16"

# ── Options ──
set block-policy drop
set loginterface egress
set skip on lo

# ── Normalisation ──
match in all scrub (no-df random-id max-mss 1440)
match out on egress scrub (no-df random-id max-mss 1440)

# ── Politique par défaut ──
block in log all
pass out quick keep state

# ── SSH ──
pass in on egress proto tcp to port 22 keep state

# ── PixelOS Web UI ──
pass in on egress proto tcp to port 9999 keep state

# ── Services internes ──
pass in on lo proto tcp to port 6167           # Conduit Matrix (local only)
pass in on lo proto tcp to port 5300           # DNS .pixel
pass in on lo proto tcp to port 1883           # Mosquitto MQTT
pass in on lo proto tcp to port 8080           # Backend Spring Boot
pass in on lo proto tcp to port 8501           # Streamlit

# ── Matrix / Comms ──
pass in on egress proto tcp to port 443        # HTTPS (PixelOS + Element Web)
pass in on egress proto tcp to port 8448       # Fédération Matrix

# ── FTP ──
pass in on egress proto tcp to port 21         # FTP (si activé)

# ── WireGuard Mesh ──
pass in on egress proto udp to port 51820      # WireGuard VPN
pass in on wg_if all keep state                # Trafic Mesh autorisé
pass in on wg_if proto tcp to port 8448        # Fédération Matrix via Mesh

# ── ICMP ──
pass in inet proto icmp icmp-type { echoreq unreach } keep state

# ── Anti-scan ──
block in quick from urpf-failed
block in quick on egress proto tcp flags FUP
block in quick on egress proto tcp flags /SFUP

# ── PixDefend — Tables de blocage dynamique ──
table <pixos_blocklist> persist
block in quick from <pixos_blocklist> to any

# ── PixDefend — Rate limiting (protection DDoS) ──
pass in on egress proto tcp from any to any port 443 \
    flags S/SA keep state (max-src-conn 10, max-src-conn-rate 5/60, overload <pixos_blocklist> flush)
pass in on egress proto tcp from any to any port 80 \
    flags S/SA keep state (max-src-conn 10, max-src-conn-rate 10/60, overload <pixos_blocklist> flush)
pass in on egress proto tcp from any to any port 22 \
    flags S/SA keep state (max-src-conn 5, max-src-conn-rate 3/120, overload <pixos_blocklist> flush)

# ── PixDefend — Protection supplémentaire ──
match in on egress proto tcp to port 22 \
    (source.os "Linux") # Bloquer les scripts Linux automatisés sur SSH

# ── PixDefend — ICMP rate limit ──
pass in inet proto icmp icmp-type echoreq keep state (max-src-states 5, max-src-conn-rate 10/10)
