# AgriCol - DHCP pour réseau IoT (em2)
# Les ESP32/Arduino reçoivent une IP fixe par MAC

option domain-name "ferme.agricol.local";
option domain-name-servers 10.0.100.1;

subnet 10.0.100.0 netmask 255.255.255.0 {
    option routers 10.0.100.1;
    range 10.0.100.100 10.0.100.200;
    default-lease-time 86400;       # 24h
    max-lease-time 604800;          # 7 jours
}

# Réservations statiques pour les nœuds critiques
host vanne_serre_nord {
    fixed-address 10.0.100.10;
    hardware ethernet AA:BB:CC:DD:EE:01;
}
host vanne_champ_ouest {
    fixed-address 10.0.100.11;
    hardware ethernet AA:BB:CC:DD:EE:02;
}
host station_meteo {
    fixed-address 10.0.100.20;
    hardware ethernet AA:BB:CC:DD:EE:10;
}
host gateway_rs485 {
    fixed-address 10.0.100.2;
    hardware ethernet AA:BB:CC:DD:EE:FF;
}
