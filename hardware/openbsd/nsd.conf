# PixelOS — NSD Authoritative DNS Server Configuration
# Gère la zone .pixel et les sous-domaines du réseau fédéré
# /var/nsd/etc/nsd.conf

server:
    ip-address: 0.0.0.0
    ip-address: ::0
    port: 53
    database: "/var/nsd/db/nsd.db"
    logfile: "/var/log/nsd.log"
    pidfile: "/var/run/nsd/nsd.pid"
    username: "_nsd"
    zonesdir: "/var/nsd/zones"
    hide-version: yes
    tcp-timeout: 5
    ipv4-edns-size: 1232

# ─── Zone locale .pixel (TLD privé) ────────────────────────
zone:
    name: "pixel"
    zonefile: "pixel.zone"
    provide-xfr: 0.0.0.0/0 NONE

# ─── Zone inverse VPN WireGuard (10.0.0.0/24) ──────────────
zone:
    name: "0.0.10.in-addr.arpa"
    zonefile: "10.0.0.zone"
    provide-xfr: 0.0.0.0/0 NONE
