# AgriCol - PF Packet Filter pour serveur agricole
# Blocage strict : les capteurs ne peuvent parler qu'au serveur local

# Interfaces
ext_if = "em0"          # Internet / réseau externe
int_if = "em1"          # Réserve
iot_if = "em2"          # Réseau IoT (capteurs, ESP32)

# Réseaux
iot_net = "10.0.100.0/24"
local_net = "10.0.1.0/24"

# Services
mqtt_port = 1883
http_port = 80
https_port = 443
node_red_port = 1880
dashboard_port = 8501
influxdb_port = 8086

set block-policy drop
set loginterface egress
set skip on lo

# --- Politique par défaut : TOUT BLOQUER ---
block in log all
block out log all

# --- Loopback ---
pass quick on lo all

# --- IoT : capteurs et microcontrôleurs (TRÈS RESTRICTIF) ---
# Les capteurs peuvent UNIQUEMENT :
# 1. Se connecter au broker MQTT local
# 2. Recevoir des commandes MQTT

block in on $iot_if
block out on $iot_if

# Les capteurs publient leurs mesures en MQTT
pass in on $iot_if proto tcp from $iot_net to 127.0.0.1 port $mqtt_port keep state
pass out on $iot_if proto tcp from 127.0.0.1 to $iot_net port $mqtt_port keep state

# Aucun accès internet pour les capteurs
block return out on egress from $iot_net

# --- Réseau local (administration) ---
# Accès dashboard web
pass in on egress proto tcp from $local_net to ($ext_if) port $dashboard_port keep state
pass in on egress proto tcp from $local_net to ($ext_if) port $node_red_port keep state

# SSH administration
pass in on egress proto tcp from $local_net to ($ext_if) port 22 keep state

# MQTT depuis le réseau local (monitoring)
pass in on egress proto tcp from $local_net to ($ext_if) port $mqtt_port keep state

# InfluxDB (métriques)
pass in on egress proto tcp from $local_net to ($ext_if) port $influxdb_port keep state

# --- Internet sortant (pour mises à jour uniquement) ---
pass out on egress proto { tcp, udp } to port 53                 # DNS
pass out on egress proto tcp to port 443                          # HTTPS (pkg_add, etc.)
pass out on egress proto tcp to port 80                           # HTTP (mirrors)

# --- ICMP (ping) limité au réseau local ---
pass in on egress proto icmp from $local_net icmp-type echoreq
pass out on egress proto icmp icmp-type echoreq

# --- Prévention flood ---
table <bruteforce> persist
block quick from <bruteforce>
pass in on egress proto tcp to port 22 \
    keep state (max-src-conn 5, max-src-conn-rate 3/30, \
    overload <bruteforce> flush global)

# --- Log tout ce qui est bloqué ---
block return out log on egress from any to any
