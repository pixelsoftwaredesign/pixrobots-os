# PixelOS - httpd(8) reverse proxy configuration
# OpenBSD native web server fronting Flask on 127.0.0.1:9999
#
# Architecture:
#   internet:80/443 → httpd (chroot /var/www) → Flask (127.0.0.1:9999) → data (/var/db/pixelos)
#
# Chroot isolation: httpd ne peut accéder qu'à /var/www
# Les données /var/db/pixelos sont HORS chroot → inaccessibles si httpd compromis
#
# Voir aussi:
#   relayd.conf  → TLS termination pour HTTPS
#   /var/www/htdocs/pixelos/static/ → assets statiques servis directement

prefork 5

# ── HTTP (port 80, redirect vers HTTPS si relayd actif) ──
server "agricol.local" {
    listen on * port 80
    root "/htdocs/pixelos"

    # Forward API requests to Flask backend
    location "/api/*" {
        forward to 127.0.0.1 port 9999
    }

    # Forward all pages to Flask
    location "/production*" {
        forward to 127.0.0.1 port 9999
    }

    location "/planning*" {
        forward to 127.0.0.1 port 9999
    }

    # Static files served directly (CSS, JS, images)
    location "/static/*" {
        root "/htdocs/pixelos/static"
        directory no auto index
    }

    # Catch-all: forward to Flask
    location "/*" {
        forward to 127.0.0.1 port 9999
    }

    # Security headers
    location "*" {
        header set "X-Content-Type-Options" "nosniff"
        header set "X-Frame-Options" "DENY"
        header set "X-XSS-Protection" "1; mode=block"
        header set "Referrer-Policy" "strict-origin-when-cross-origin"
    }
}

