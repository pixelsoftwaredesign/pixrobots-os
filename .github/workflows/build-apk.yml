      - uses: gradle/actions/setup-gradle@v3
      - run: cd pixos-messenger && gradle assembleDebug
      - uses: actions/upload-artifact@v4
        with: { name: pixos-messenger-debug, path: pixos-messenger/app/build/outputs/apk/debug/*.apk }

  build-connect:
