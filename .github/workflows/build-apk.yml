name: Build PixOS APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-pixos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: 17, distribution: temurin }

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build PixOS
        run: cd pixos && gradle assembleDebug

      - uses: actions/upload-artifact@v4
        with: { name: pixos-debug, path: pixos/app/build/outputs/apk/debug/*.apk }

  build-messenger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
